<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💰 Prim Bordrosu · MRPD</title>
<link rel="stylesheet" href="/css/themes.css">

<style>
.income-card { background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(34,197,94,0.06)); border: 1px solid rgba(99,102,241,0.3); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
.income-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; align-items: end; }
@media (max-width: 800px) { .income-grid { grid-template-columns: 1fr; } }
.in-label { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 8px; display: block; }
.income-input-wrap { position: relative; }
.income-input { width: 100%; padding: 14px 16px 14px 42px; background: var(--bg-1); border: 2px solid #22c55e; border-radius: 10px; color: #86efac; font-size: 22px; font-weight: 800; box-sizing: border-box; }
.income-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
.income-cur { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #86efac; font-size: 20px; font-weight: 800; pointer-events: none; }
.period-input { padding: 14px 16px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 14px; width: 100%; box-sizing: border-box; }
.bd-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 14px; }
.bd-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.bd-card.salary { border-color: rgba(99,102,241,0.4); }
.bd-card.pool { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }
.bd-card.fto { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.05); }
.bd-card.officer { border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.05); }
.bd-card.night { border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.05); }
.bd-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.bd-value { font-size: 17px; font-weight: 800; color: #fff; line-height: 1.15; }
.bd-meta { font-size: 10px; color: var(--text-mute); margin-top: 3px; }
.bd-card.salary .bd-value { color: #a5b4fc; }
.bd-card.pool .bd-value { color: #86efac; }
.bd-card.fto .bd-value { color: #fcd34d; }
.bd-card.officer .bd-value { color: #d8b4fe; }
.bd-card.night .bd-value { color: #93c5fd; }
.awards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 800px) { .awards-row { grid-template-columns: 1fr; } }
.award-card { background: rgba(0,0,0,0.45); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; }
.award-card.has-award.fto { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.06); }
.award-card.has-award.officer { border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.06); }
.award-icon { width: 44px; height: 44px; border-radius: 11px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
.award-card.fto .award-icon { background: linear-gradient(135deg, #f59e0b, #d97706); }
.award-card.officer .award-icon { background: linear-gradient(135deg, #a855f7, #7c3aed); }

.cfg-section-head { color: #fff; font-size: 12px; font-weight: 700; padding: 8px 0 4px; border-bottom: 1px solid var(--border); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.7px; }
.cfg-row { display: grid; grid-template-columns: 1fr 130px; gap: 12px; align-items: center; padding: 7px 0; }
.cfg-row label { font-size: 12px; color: var(--text-dim); }
.cfg-row label small { display: block; color: var(--text-mute); font-size: 10px; margin-top: 1px; }
.cfg-row input { padding: 7px 10px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; color: #fff; text-align: right; font-size: 13px; }
.detail-grid { padding: 14px 18px; background: var(--bg-1); border-radius: 8px; margin: 0 0 12px; }
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 12px; border-bottom: 1px dashed rgba(255,255,255,0.05); }
.detail-row:last-child { border-bottom: none; }

.detail-total { padding: 12px 18px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.detail-total .lbl { color: #fff; font-weight: 700; }
.detail-total .val { color: #86efac; font-weight: 800; font-size: 18px; }
</style>

<span id="dutyCountBadge" style="padding:5px 10px; background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.4); color:#86efac; border-radius:999px; font-size:11px; font-weight:700;">— mesaide</span>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>

<script src="/js/sidebar.js"></script>
<script>
if (!Perms.requireStaff()) { /* staff değil */ }
        if (!Perms.require(PERM.PAGE_PAYROLL)) { /* yönlendirildi */ }
document.getElementById('topBarContainer').innerHTML = renderTopBar();
document.getElementById('sidebar').innerHTML = renderSidebar('payroll');

// ─── KONFIG (v4 — eski cache otomatik silinir) ───
const CFG_KEY = 'mrpd_payroll_cfg_v4';
const DATA_KEY = 'mrpd_payroll_data_v3';

// Eski v3 cache'i temizle (rütbe ağırlıkları yenilensin diye)
localStorage.removeItem('mrpd_payroll_cfg_v3');

const DEFAULT_CFG = {
    currency: '$',
    salaryRatio: 7/8,
    poolRatio: 1/8,
    ftoPercent: 10,
    officerPercent: 15,
    roundTo: 5000,
    rankWeight: {
        // Roman ve Arabic ikisini de tanır — normalizeRank çevirir
        'Captain': 28,
        'Lieutenant 2': 18,
        'Lieutenant 1': 18,
        'Sergeant 2': 16,
        'Sergeant 1': 16,
        'Detective': 14,
        'Officer 3+1': 14,
        'Officer 3': 12,
        'Officer 2': 11,
        'Officer 1': 9,
        'Cadet': 5,
    },
};

function loadCfg() {
    try { return { ...DEFAULT_CFG, ...(JSON.parse(localStorage.getItem(CFG_KEY) || '{}')) }; }
    catch { return { ...DEFAULT_CFG }; }
}
function saveCfg(c) { localStorage.setItem(CFG_KEY, JSON.stringify(c)); }

let cfg = loadCfg();
let allPersonnel = [];
let weekData = {};
let currentWeek = '';

function loadWeekData() {
    try { weekData = JSON.parse(localStorage.getItem(DATA_KEY) || '{}'); }
    catch { weekData = {}; }
}
function saveWeekData() { localStorage.setItem(DATA_KEY, JSON.stringify(weekData)); }

// ─── HELPERS ───
function escapeHTML(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getName(p) {
    let n = cleanName(String(p.ic_name || p.name || `#${p.id || '?'}`));
    return n.replace(/\[\d+\]/g, '').replace(/\[[Mm]\]/g, '').replace(/\s+/g, ' ').trim() || `#${p.id || '?'}`;
}
function getInitials(n) { return String(n).split(/\s+/).filter(Boolean).slice(0,2).map(p => p[0]?.toUpperCase()).join('') || '?'; }
function getRank(p) { return p.rank_name || p.rankName || p.rank || ''; }
function getCallsign(p) { return String(p.callsign || p.id || ''); }
function fmt(n, round = true) {
    let val = n || 0;
    if (round && cfg.roundTo > 0) val = Math.floor(val / cfg.roundTo) * cfg.roundTo;
    return cfg.currency + ' ' + val.toLocaleString('tr-TR');
}

// ★★★ AKILLI RÜTBE EŞLEŞTİRİCİ — Roman ↔ Arabic, varyasyonlar
function normalizeRank(rank) {
    if (!rank) return '';
    let s = String(rank).toLowerCase().trim();
    // Roman → Arabic (uzun olanı önce)
    s = s.replace(/\biii\+i\b/g, '3+1')
         .replace(/\biii\b/g, '3')
         .replace(/\bii\+i\b/g, '2+1')
         .replace(/\bii\b/g, '2')
         .replace(/\bi\+i\b/g, '1+1')
         .replace(/\biv\b/g, '4')
         .replace(/\bv\b/g, '5')
         .replace(/\bi\b/g, '1');
    s = s.replace(/\s+/g, ' ').trim();
    return s;
}

function getRankWeight(rank) {
    if (!rank) return 0;
    
    // 1) Tam eşleşme
    if (cfg.rankWeight[rank] != null) return cfg.rankWeight[rank];
    
    // 2) Normalize edilmiş eşleşme (Captain I → captain 1)
    const normInput = normalizeRank(rank);
    for (const [k, v] of Object.entries(cfg.rankWeight)) {
        if (normalizeRank(k) === normInput) return v;
    }
    
    // 3) İçerme — config'deki kelime input'ta varsa
    let bestMatch = null;
    let bestLen = 0;
    for (const [k, v] of Object.entries(cfg.rankWeight)) {
        const nk = normalizeRank(k);
        if (normInput.includes(nk) && nk.length > bestLen) {
            bestMatch = v;
            bestLen = nk.length;
        }
    }
    if (bestMatch != null) return bestMatch;
    
    // 4) Bilinmeyen rütbe
    if (!window._unknownRanks) window._unknownRanks = new Set();
    if (!window._unknownRanks.has(rank)) {
        window._unknownRanks.add(rank);
        console.warn(`[Payroll] Bilinmeyen rütbe: "${rank}" → ⚙️ Ayarlar'dan ekle`);
    }
    return 1;
}

// ─── HAFTA ───
function buildWeeks() {
    const sel = document.getElementById('weekSel');
    let opts = '';
    const now = new Date();
    const m = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    for (let i = 0; i < 12; i++) {
        const monday = new Date(now);
        monday.setDate(now.getDate() - now.getDay() + 1 - i * 7);
        monday.setHours(0,0,0,0);
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        const key = monday.toISOString().slice(0,10);
        const label = `${monday.getDate()} ${m[monday.getMonth()]} - ${sunday.getDate()} ${m[sunday.getMonth()]} ${sunday.getFullYear()}`;
        opts += `<option value="${key}" ${i===0?'selected':''}>${label}${i===0?' (bu hafta)':''}</option>`;
    }
    sel.innerHTML = opts;
    currentWeek = sel.value;
}

// ─── HESAPLAMA ───
function getWeek() {
    if (!weekData[currentWeek]) weekData[currentWeek] = { income: 800000, ftoId: '', officerId: '', hours: {} };
    return weekData[currentWeek];
}

function calcDistribution() {
    const w = getWeek();
    const income = parseFloat(w.income) || 0;
    const salaryPool = income * cfg.salaryRatio;
    const bonusPool = income * cfg.poolRatio;
    const ftoAward = bonusPool * (cfg.ftoPercent / 100);
    const officerAward = bonusPool * (cfg.officerPercent / 100);
    const nightPool = bonusPool - ftoAward - officerAward;
    
    let totalRankWeight = 0;
    for (const p of allPersonnel) totalRankWeight += getRankWeight(getRank(p));
    
    let totalNightHours = 0;
    for (const id in (w.hours || {})) totalNightHours += parseFloat(w.hours[id]) || 0;
    
    const nightRate = totalNightHours > 0 ? nightPool / totalNightHours : 0;
    
    return { income, salaryPool, bonusPool, ftoAward, officerAward, nightPool, nightRate, totalRankWeight, totalNightHours };
}

function calcPerson(p, dist) {
    const w = getWeek();
    const rankWeight = getRankWeight(getRank(p));
    const nightHours = parseFloat((w.hours || {})[p.id]) || 0;
    const salaryShare = dist.totalRankWeight > 0 ? (rankWeight / dist.totalRankWeight) * dist.salaryPool : 0;
    const nightPay = nightHours * dist.nightRate;
    const isFto = String(w.ftoId) === String(p.id);
    const isOfficer = String(w.officerId) === String(p.id);
    const award = (isFto ? dist.ftoAward : 0) + (isOfficer ? dist.officerAward : 0);
    return { salaryShare, nightHours, nightPay, isFto, isOfficer, award, total: salaryShare + nightPay + award };
}

// ─── RENDER ───
function renderBreakdown() {
    const d = calcDistribution();
    document.getElementById('breakdown').innerHTML = `
        <div class="bd-card salary"><div class="bd-label">🎖️ Maaş Havuzu</div><div class="bd-value">${fmt(d.salaryPool)}</div><div class="bd-meta">${(cfg.salaryRatio*100).toFixed(1)}%</div></div>
        <div class="bd-card pool"><div class="bd-label">💎 Prim Havuzu</div><div class="bd-value">${fmt(d.bonusPool)}</div><div class="bd-meta">${(cfg.poolRatio*100).toFixed(1)}%</div></div>
        <div class="bd-card fto"><div class="bd-label">🎓 FTO Ödülü</div><div class="bd-value">${fmt(d.ftoAward)}</div><div class="bd-meta">Havuzun %${cfg.ftoPercent}</div></div>
        <div class="bd-card officer"><div class="bd-label">🏆 Memur Ödülü</div><div class="bd-value">${fmt(d.officerAward)}</div><div class="bd-meta">Havuzun %${cfg.officerPercent}</div></div>
        <div class="bd-card night"><div class="bd-label">🌙 Night Havuzu</div><div class="bd-value">${fmt(d.nightPool)}</div><div class="bd-meta">${d.totalNightHours.toFixed(1)} sa · ${fmt(d.nightRate)}/sa</div></div>
    `;
    document.getElementById('ftoAmount').textContent = fmt(d.ftoAward);
    document.getElementById('officerAmount').textContent = fmt(d.officerAward);
}

function renderAwardSelects() {
    const w = getWeek();
    const opts = '<option value="">— Seç —</option>' + 
        allPersonnel.map(p => `<option value="${p.id}">${escapeHTML(getName(p))} ${getCallsign(p)?`[${getCallsign(p)}]`:''}</option>`).join('');
    const ftoSel = document.getElementById('ftoSel');
    const offSel = document.getElementById('officerSel');
    ftoSel.innerHTML = opts;
    offSel.innerHTML = opts;
    ftoSel.value = w.ftoId || '';
    offSel.value = w.officerId || '';
    document.getElementById('ftoCard').classList.toggle('has-award', !!w.ftoId);
    document.getElementById('officerCard').classList.toggle('has-award', !!w.officerId);
}

function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const tbody = document.getElementById('payTbody');
    const dist = calcDistribution();
    const w = getWeek();
    
    const filtered = allPersonnel.filter(p => {
        if (!search) return true;
        return getName(p).toLowerCase().includes(search) ||
               getCallsign(p).toLowerCase().includes(search) ||
               getRank(p).toLowerCase().includes(search);
    });
    
    if (!filtered.length) { tbody.innerHTML = `<tr><td colspan="7" class="empty-row">Personel bulunamadı</td></tr>`; return; }
    
    tbody.innerHTML = filtered.map(p => {
        const calc = calcPerson(p, dist);
        const name = getName(p);
        const cs = getCallsign(p);
        const nightHours = parseFloat((w.hours || {})[p.id]) || '';
        const rowClass = calc.isFto ? 'is-fto' : (calc.isOfficer ? 'is-officer' : '');
        const tags = [];
        if (calc.isFto) tags.push('<span class="role-tag fto">🎓 FTO</span>');
        if (calc.isOfficer) tags.push('<span class="role-tag officer">🏆 MEMUR</span>');
        return `
            <tr data-pid="${p.id}" class="${rowClass}">
                <td>
                    <div class="row-name">
                        <div class="row-avatar">${getInitials(name)}</div>
                        <div>
                            <div class="row-name-text">${escapeHTML(name)}${tags.join('')}</div>
                            <div class="row-meta">${cs?`[${escapeHTML(cs)}] · `:''}${escapeHTML(getRank(p))} (ağ. ${getRankWeight(getRank(p))})</div>
                        </div>
                    </div>
                </td>
                <td><span class="cell-amount salary">${fmt(calc.salaryShare)}</span></td>
                <td><input type="number" class="row-input night" min="0" step="0.5" value="${nightHours}" placeholder="0" onchange="updateNight(${p.id}, this.value)"></td>
                <td><span class="cell-amount night">${fmt(calc.nightPay)}</span></td>
                <td>${calc.award > 0 ? `<span class="cell-amount bonus">${fmt(calc.award)}</span>` : '—'}</td>
                <td style="text-align:right;"><span class="cell-total">${fmt(calc.total)}</span></td>
                <td style="text-align:right;"><button class="btn-sec" style="padding:5px 9px;" onclick="openDetail(${p.id})" title="Detay">👁</button></td>
            </tr>
        `;
    }).join('');
}

function rerenderAll() {
    renderBreakdown();
    renderTable();
    // Mesaide sayısı badge güncelle
    const badge = document.getElementById('dutyCountBadge');
    if (badge) badge.textContent = `${allPersonnel.length} mesaide`;
}



// ─── ACTIONS ───
function onIncomeChange() {
    getWeek().income = parseFloat(document.getElementById('incomeInput').value) || 0;
    saveWeekData(); rerenderAll();
}
function updateNight(personId, value) {
    const w = getWeek();
    if (!w.hours) w.hours = {};
    w.hours[personId] = parseFloat(value) || 0;
    saveWeekData(); rerenderAll();
}
function onAwardChange() {
    const w = getWeek();
    w.ftoId = document.getElementById('ftoSel').value;
    w.officerId = document.getElementById('officerSel').value;
    saveWeekData();
    document.getElementById('ftoCard').classList.toggle('has-award', !!w.ftoId);
    document.getElementById('officerCard').classList.toggle('has-award', !!w.officerId);
    renderTable();
}
function resetWeek() {
    if (!confirm('Bu haftanın tüm verileri silinsin mi?')) return;
    delete weekData[currentWeek];
    saveWeekData();
    loadPayroll();
}

async function autoFillFromDuty() {
    if (!confirm('DB\'den night shift saatleri çekilsin mi? Mevcut night saatleri ÜZERİNE YAZILACAK.')) return;
    const endpoints = [`/duty/summary?week=${currentWeek}`, `/duty/weekly?start=${currentWeek}`, `/stats/duty-by-person?week=${currentWeek}`];
    let summary = null;
    for (const ep of endpoints) {
        try { const r = await api.get(ep); if (r?.data) { summary = r.data; break; } } catch {}
    }
    if (!summary) { alert('⚠️ Mesai endpoint\'i bulunamadı.\n\nBackend\'e ekle:\n  GET /api/duty/summary?week=YYYY-MM-DD\nDönüş: { "personId": { nightHours: X } }'); return; }
    const w = getWeek();
    if (!w.hours) w.hours = {};
    let filled = 0;
    for (const p of allPersonnel) {
        const s = summary[p.id] || summary[String(p.id)];
        if (!s) continue;
        w.hours[p.id] = parseFloat(s.nightHours || s.night_hours || 0);
        filled++;
    }
    saveWeekData(); rerenderAll();
    alert(`✅ ${filled} personelin night saati dolduruldu`);
}

function exportCSV() {
    const dist = calcDistribution();
    const rows = [
        [`Hafta: ${currentWeek}`, `Gelir: ${dist.income}`, '', '', ''],
        ['Personel', 'Rütbe', 'Rütbe Maaşı', 'Night (sa)', 'Night Primi', 'Hafta Ödülü', 'Toplam'],
    ];
    for (const p of allPersonnel) {
        const calc = calcPerson(p, dist);
        rows.push([getName(p), getRank(p), Math.round(calc.salaryShare), calc.nightHours, Math.round(calc.nightPay), Math.round(calc.award), Math.round(calc.total)]);
    }
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bordro-${currentWeek}.csv`; a.click();
    URL.revokeObjectURL(url);
}

// ─── LOAD ───
async function loadPayroll() {
    currentWeek = document.getElementById('weekSel').value;
    document.getElementById('weekTitle').textContent = document.getElementById('weekSel').options[document.getElementById('weekSel').selectedIndex].text;
    const w = getWeek();
    document.getElementById('incomeInput').value = w.income || 0;
    
    if (!allPersonnel.length) {
        document.getElementById('payTbody').innerHTML = `<tr><td colspan="7" class="empty-row"><div class="spinner"></div><div style="margin-top:10px;">Mesaide olanlar yükleniyor...</div></td></tr>`;
        
        try {
            // ŞUAN AKTİF MESAİDE OLANLARI ÇEK
            const dutyRes = await api.get('/duty/active');
            
            // Esnek parse — endpoint farklı format dönebilir
            let dutyList = dutyRes?.data?.personnel 
                        || dutyRes?.data?.members 
                        || dutyRes?.data?.items
                        || dutyRes?.data 
                        || dutyRes?.personnel
                        || dutyRes?.members
                        || dutyRes;
            
            if (!Array.isArray(dutyList)) {
                console.error('[Payroll] /duty/active beklenmedik format:', dutyRes);
                dutyList = [];
            }
            
            console.log(`[Payroll] /duty/active → ${dutyList.length} kişi aktif`);
            console.log('[Payroll] İlk aktif kişi örneği:', dutyList[0]);
            
            // duty/active sadece minimal bilgi dönüyor olabilir → ic_name yoksa personnel'den çek
            const needsEnrichment = dutyList.length > 0 && !dutyList[0].ic_name && !dutyList[0].rank_name;
            
            if (needsEnrichment) {
                console.log('[Payroll] Detay bilgi çekiliyor...');
                const allRes = await api.get('/personnel?limit=500');
                const allPpl = allRes?.data?.personnel || allRes?.data || [];
                const pplMap = new Map(allPpl.map(p => [String(p.id), p]));
                
                // Her aktif kişiye personnel detaylarını ekle
                dutyList = dutyList.map(d => {
                    // Kişiyi bulmak için olası ID alanları
                    const pid = d.personnel_id || d.id || d.user_id;
                    const full = pplMap.get(String(pid));
                    return full ? { ...full, ...d, id: full.id } : d;
                }).filter(p => p.id); // ID'si olmayanları at
                
                console.log(`[Payroll] ${dutyList.length} aktif kişi zenginleştirildi`);
            }
            
            allPersonnel = dutyList;
            
        } catch (e) {
            showError('Aktif mesaideler yüklenemedi: ' + e.message);
            console.error(e);
            return;
        }
    }
    
    renderAwardSelects();
    rerenderAll();
    
    const badge = document.getElementById('dutyCountBadge');
    if (badge) badge.textContent = `${allPersonnel.length} mesaide`;
    
    // Night saatlerini otomatik doldur
    if (Object.keys(w.hours || {}).length === 0) {
        try {
            const sumRes = await api.get(`/duty/summary?week=${currentWeek}`);
            if (sumRes?.data) {
                const newHours = {};
                for (const p of allPersonnel) {
                    const s = sumRes.data[p.id] || sumRes.data[String(p.id)];
                    if (s) newHours[p.id] = parseFloat(s.nightHours || 0);
                }
                w.hours = newHours;
                saveWeekData();
                rerenderAll();
                console.log('[Payroll] Night saatleri otomatik dolduruldu');
            }
        } catch {}
    }
}

document.getElementById('searchInput').addEventListener('input', renderTable);

async function reloadPersonnel() {
    allPersonnel = []; // cache'i sıfırla
    document.getElementById('dutyCountBadge').textContent = 'yükleniyor...';
    await loadPayroll();
}

buildWeeks();
loadWeekData();
loadPayroll();
