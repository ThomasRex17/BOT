<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Personel · MRPD</title>
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/public.css">
<link rel="stylesheet" href="/css/dashboard.css">
<link rel="stylesheet" href="/css/hotfix-tur11.css?v=2">
</head>
<body>

<div id="topBarContainer"></div>

<div class="dash-layout">
    <aside class="dash-sidebar" id="sidebar"></aside>
    <main class="dash-main">
        <div class="dash-header">
            <h1>Personel Yönetimi</h1>
            <p id="totalCount">Yükleniyor...</p>
        </div>
        
        <div class="table-card">
            <div class="table-card-head">
                <div style="display: flex; gap: 10px; align-items: center; flex: 1;">
                    <input type="text" id="searchInput" placeholder="🔍 İsim, sicil, telsiz ara..." 
                           style="background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 13px; min-width: 240px; outline: none;" />
                    <select id="rankFilter" style="background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 13px; outline: none;">
                        <option value="">Tüm Rütbeler</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Yeni Personel</button>
            </div>
            
            <div id="loadingDiv" class="loading"><div class="spinner"></div></div>
            
            <!-- Otomatik isimli (User_xxx, Discord adsız) kayıtlar varsa uyarı banner'ı -->
            <div id="cleanupBanner" style="display: none;" class="bulk-cleanup-banner">
                <div class="info">
                    <strong>⚠️ <span id="autoCount">0</span> adet otomatik isimli kayıt</strong> tespit edildi (örn: <code>User_137955</code>). 
                    Bunlar Discord bot tarafından otomatik oluşturuluyor olabilir. Hepsini bir kerede silebilirsin.
                </div>
                <button onclick="showAutoCleanupDialog()">🗑 Temizle</button>
            </div>
            
            <div id="tableContainer" style="display: none; overflow-x: auto;">
                <table class="dt">
                    <thead>
                        <tr>
                            <th>Telsiz</th>
                            <th>Personel</th>
                            <th>Rütbe</th>
                            <th>Durum</th>
                            <th>Discord</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div id="paginationContainer" class="pag"></div>
            </div>
        </div>
    </main>
</div>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>
<script src="/js/permissions.js"></script>
<script src="/js/ui-helpers.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/personnel-modal.js"></script>
<script>
if (!Perms.requireStaff()) { /* staff değil */ }
        if (!Perms.require(PERM.PAGE_PERSONNEL)) { /* yönlendirildi */ }

document.getElementById('topBarContainer').innerHTML = renderTopBar();
document.getElementById('sidebar').innerHTML = renderSidebar('personnel');

let currentPage = 1;
let totalPages = 1;
let allRanks = [];
let searchTimer = null;

async function loadRanks() {
    try {
        const res = await api.get('/ranks');
        allRanks = res.data;
        const select = document.getElementById('rankFilter');
        allRanks.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = r.name;
            select.appendChild(opt);
        });
    } catch {}
}

async function loadPersonnel(page = 1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value.trim();
    const rankId = document.getElementById('rankFilter').value;
    
    document.getElementById('loadingDiv').style.display = 'block';
    document.getElementById('tableContainer').style.display = 'none';
    
    try {
        const params = new URLSearchParams({ page, limit: 25 });
        if (search) params.set('search', search);
        if (rankId) params.set('rank_id', rankId);
        
        const res = await api.get('/personnel?' + params);
        const { items, pagination } = res.data;
        totalPages = pagination.pages;
        
        document.getElementById('totalCount').textContent = `Toplam ${pagination.total} personel · Sayfa ${pagination.page}/${pagination.pages}`;
        renderTable(items);
        renderPagination(pagination);
        
        document.getElementById('loadingDiv').style.display = 'none';
        document.getElementById('tableContainer').style.display = 'block';
        
        // Otomatik isim tespiti — User_xxx, Discord-id formatlı isimler vs.
        checkAutoNamedRecords();
    } catch (err) {
        document.getElementById('loadingDiv').innerHTML = `<div class="empty">${err.message}</div>`;
    }
}

// Otomatik isimli kayıtları tespit et — sadece TÜM sayfaları tara
async function checkAutoNamedRecords() {
    try {
        // Tüm personeli çek (limit yüksek)
        const res = await api.get('/personnel?page=1&limit=500');
        const all = res.data.items || [];
        // Otomatik isim pattern'ları:
        const autoNamed = all.filter(p => {
            const n = String(p.ic_name || '').trim();
            // User_123456, user_xxx, "- Adam" gibi placeholder isimler
            return /^User[_\s]?\d+$/i.test(n)
                || /^User_\d+$/i.test(n)
                || /^-\s/.test(n)
                || (!n || n === '—' || n.length < 2);
        });
        window._autoNamedRecords = autoNamed;
        const banner = document.getElementById('cleanupBanner');
        if (autoNamed.length > 0) {
            banner.style.display = '';
            document.getElementById('autoCount').textContent = autoNamed.length;
        } else {
            banner.style.display = 'none';
        }
    } catch (err) {
        console.error('checkAutoNamedRecords:', err);
    }
}

// Temizleme onay modal'ı
function showAutoCleanupDialog() {
    const records = window._autoNamedRecords || [];
    if (!records.length) {
        showError('Temizlenecek kayıt yok');
        return;
    }
    
    const preview = records.slice(0, 10).map(p => `
        <div style="display: flex; justify-content: space-between; padding: 6px 10px; background: rgba(0,0,0,0.3); border-radius: 6px; margin-bottom: 4px; font-size: 12px;">
            <span>${escapeHtml(p.ic_name || '(boş)')}</span>
            <code style="color: var(--text-mute); font-size: 10px;">${p.discord_id ? p.discord_id.substring(0, 14) + '...' : '—'}</code>
        </div>
    `).join('');
    
    showModal({
        title: '🗑 Otomatik İsimli Kayıtları Temizle',
        subtitle: `${records.length} kayıt silinecek`,
        body: `
            <div style="background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 12px; color: var(--text);">
                ⚠️ <strong>Dikkat:</strong> Bu işlem <strong>${records.length} personel kaydını</strong> sırayla silecek. 
                İşlem geri alınamaz. Eğer bot Discord'dan otomatik üye senkronizasyonu yapıyorsa, silinen kayıtlar 
                yeniden eklenebilir — bu durumda <strong>bot ayarlarından otomatik ekleme'yi de kapatman gerekir</strong>.
            </div>
            
            <div style="font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
                SİLİNECEK İLK 10 KAYIT (toplam ${records.length})
            </div>
            ${preview}
            ${records.length > 10 ? `<div style="text-align: center; color: var(--text-mute); font-size: 11px; margin-top: 8px;">+ ${records.length - 10} kayıt daha</div>` : ''}
            
            <div id="cleanupProgress" style="display: none; margin-top: 14px; padding: 12px; background: var(--bg-3); border-radius: 8px; font-size: 12px;">
                <div style="margin-bottom: 6px;">Siliniyor: <strong id="cleanupStatus">0 / 0</strong></div>
                <div style="background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; overflow: hidden;">
                    <div id="cleanupBar" style="background: var(--primary); height: 100%; width: 0%; transition: width 0.2s;"></div>
                </div>
            </div>
        `,
        buttons: [
            { id: 'cancel', label: 'Vazgeç', class: 'btn-ghost', onClick: closeModal },
            { id: 'confirm', label: `🗑 Hepsini Sil (${records.length})`, class: 'btn-danger', onClick: async () => {
                const progressEl = document.getElementById('cleanupProgress');
                const statusEl = document.getElementById('cleanupStatus');
                const barEl = document.getElementById('cleanupBar');
                progressEl.style.display = 'block';
                
                let ok = 0, fail = 0;
                const total = records.length;
                
                for (let i = 0; i < records.length; i++) {
                    const p = records[i];
                    statusEl.textContent = `${i+1} / ${total} — ${p.ic_name || '(boş)'}`;
                    barEl.style.width = `${((i+1)/total)*100}%`;
                    try {
                        await api.delete(`/personnel/${p.id}`);
                        ok++;
                    } catch (e) {
                        fail++;
                        console.error('Sil hatası', p.id, e.message);
                    }
                }
                
                closeModal();
                if (fail === 0) {
                    showSuccess(`✓ ${ok} kayıt silindi`);
                } else {
                    showError(`${ok} silindi, ${fail} başarısız. Backend silme endpoint'i çalışmıyor olabilir.`);
                }
                loadPersonnel(1);
            }},
        ],
    });
}

function renderTable(items) {
    const tbody = document.getElementById('tableBody');
    
    if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">👥</div>Personel bulunamadı</div></td></tr>`;
        return;
    }
    
    tbody.innerHTML = items.map(p => `
        <tr>
            <td><strong style="color: ${p.rank_color || 'var(--text-mute)'};">${p.callsign ? `[${p.callsign}]` : '—'}</strong></td>
            <td>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="av av-sm">${(cleanName(p.ic_name) || '?')[0].toUpperCase()}</div>
                    <div>
                        <div style="font-weight: 600; color: #fff;">${escapeHtml(cleanName(p.ic_name) || '—')}</div>
                        ${p.ooc_name ? `<div style="font-size: 11px; color: var(--text-mute);">${escapeHtml(p.ooc_name)}</div>` : ''}
                    </div>
                </div>
            </td>
            <td>${p.rank_name 
                ? `<span class="pill" style="background: ${p.rank_color}25; color: ${p.rank_color}; border-color: ${p.rank_color}50;">${p.rank_name}</span>`
                : '<span class="pill pill-mute">—</span>'
            }</td>
            <td>${renderStatus(p.status)}</td>
            <td><code style="font-size: 11px; color: var(--text-mute);">${p.discord_id ? p.discord_id.substring(0, 12) + '...' : '—'}</code></td>
            <td class="text-right">
                <button class="btn btn-ghost btn-xs" onclick="openEditModal(${p.id})">Düzenle</button>
                <button class="btn btn-danger btn-xs" onclick="deletePersonnel(${p.id})">Sil</button>
            </td>
        </tr>
    `).join('');
}

function renderStatus(status) {
    const map = {
        online: { label: '● Aktif', class: 'pill-success' },
        offline: { label: '○ Çevrimdışı', class: 'pill-mute' },
        duty: { label: '● Görevde', class: 'pill-warn' },
        mazeret: { label: '● Mazeretli', class: 'pill-primary' },
    };
    const s = map[status] || map.offline;
    return `<span class="pill ${s.class}">${s.label}</span>`;
}

function renderPagination(pag) {
    const c = document.getElementById('paginationContainer');
    if (pag.pages <= 1) { c.innerHTML = ''; return; }
    
    let html = `<button class="pag-btn" ${pag.page <= 1 ? 'disabled' : ''} onclick="loadPersonnel(${pag.page - 1})">← Önceki</button>`;
    for (let i = 1; i <= pag.pages; i++) {
        if (i === 1 || i === pag.pages || (i >= pag.page - 2 && i <= pag.page + 2)) {
            html += `<button class="pag-btn ${i === pag.page ? 'active' : ''}" onclick="loadPersonnel(${i})">${i}</button>`;
        } else if (i === pag.page - 3 || i === pag.page + 3) {
            html += `<span style="padding: 6px;">...</span>`;
        }
    }
    html += `<button class="pag-btn" ${pag.page >= pag.pages ? 'disabled' : ''} onclick="loadPersonnel(${pag.page + 1})">Sonraki →</button>`;
    c.innerHTML = html;
}

function personnelFormHtml(p) {
    const rankOptions = allRanks.map(r => 
        `<option value="${r.id}" ${p?.rank_id === r.id ? 'selected' : ''}>${r.name}</option>`
    ).join('');
    
    return `
        <form id="personnelForm">
            <div class="form-row-2">
                <div class="form-group">
                    <label>IC İsim *</label>
                    <input name="ic_name" required maxlength="64" value="${escapeHtml(p?.ic_name || '')}" />
                </div>
                <div class="form-group">
                    <label>OOC İsim</label>
                    <input name="ooc_name" maxlength="64" value="${escapeHtml(p?.ooc_name || '')}" />
                </div>
            </div>
            <div class="form-row-2">
                <div class="form-group">
                    <label>Telsiz Kodu</label>
                    <input name="callsign" type="number" value="${p?.callsign || ''}" placeholder="örn: 101" />
                </div>
                <div class="form-group">
                    <label>Rozet Numarası</label>
                    <input name="badge_number" maxlength="16" value="${escapeHtml(p?.badge_number || '')}" />
                </div>
            </div>
            <div class="form-row-2">
                <div class="form-group">
                    <label>Rütbe</label>
                    <select name="rank_id">
                        <option value="">— Seç —</option>
                        ${rankOptions}
                    </select>
                </div>
                <div class="form-group">
                    <label>Durum</label>
                    <select name="status">
                        <option value="offline" ${p?.status === 'offline' ? 'selected' : ''}>Çevrimdışı</option>
                        <option value="online" ${p?.status === 'online' ? 'selected' : ''}>Aktif</option>
                        <option value="duty" ${p?.status === 'duty' ? 'selected' : ''}>Görevde</option>
                        <option value="mazeret" ${p?.status === 'mazeret' ? 'selected' : ''}>Mazeretli</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Discord ID</label>
                <input name="discord_id" maxlength="32" value="${p?.discord_id || ''}" placeholder="123456789..." />
            </div>
            <div class="form-group">
                <label>Notlar</label>
                <textarea name="notes" maxlength="500" style="min-height: 80px;">${escapeHtml(p?.notes || '')}</textarea>
            </div>
        </form>
    `;
}

function openCreateModal() {
    showModal({
        title: 'Yeni Personel',
        subtitle: 'Yeni bir personel kaydı oluştur',
        size: 'lg',
        body: personnelFormHtml(null),
        buttons: [
            { id: 'cancel', label: 'İptal', class: 'btn-ghost', onClick: closeModal },
            { id: 'save', label: '+ Oluştur', class: 'btn-primary', onClick: () => savePersonnel(null) },
        ],
    });
}

async function openEditModal(id) {
    await openPersonnelEditModal(id);
}

async function savePersonnel(id) {
    const fd = new FormData(document.getElementById('personnelForm'));
    const data = {
        ic_name: fd.get('ic_name'),
        ooc_name: fd.get('ooc_name') || null,
        callsign: fd.get('callsign') ? parseInt(fd.get('callsign')) : null,
        badge_number: fd.get('badge_number') || null,
        rank_id: fd.get('rank_id') ? parseInt(fd.get('rank_id')) : null,
        status: fd.get('status'),
        discord_id: fd.get('discord_id') || null,
        notes: fd.get('notes') || null,
    };
    
    if (!data.ic_name || data.ic_name.length < 2) {
        showError('IC isim en az 2 karakter olmalı'); return;
    }
    
    try {
        if (id) await api.put(`/personnel/${id}`, data);
        else await api.post('/personnel', data);
        showSuccess(id ? 'Güncellendi' : 'Eklendi');
        closeModal();
        loadPersonnel(currentPage);
    } catch (err) { showError(err.message); }
}

function deletePersonnel(id) {
    showConfirm('Bu personeli silmek istediğine emin misin? Bu işlem geri alınamaz.', async () => {
        try {
            await api.delete(`/personnel/${id}`);
            showSuccess('Silindi');
            loadPersonnel(currentPage);
        } catch (err) { showError(err.message); }
    });
}

document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadPersonnel(1), 350);
});
document.getElementById('rankFilter').addEventListener('change', () => loadPersonnel(1));

(async () => {
    await loadRanks();
    await loadPersonnel(1);
})();

setInterval(() => {
    if (document.getElementById('modal-bd')) return;
    if (document.activeElement === document.getElementById('searchInput')) return;
    loadPersonnel(currentPage);
}, 20000);
</script>
</body>
</html>
