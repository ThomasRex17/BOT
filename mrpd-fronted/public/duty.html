<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mesai Takibi · MRPD</title>
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/public.css">
<link rel="stylesheet" href="/css/dashboard.css">
<link rel="stylesheet" href="/css/hotfix-tur11.css?v=2">
</head>
<body>

<div id="topBarContainer"></div>

<div class="dash-layout">
    <aside class="dash-sidebar" id="sidebar"></aside>
    <main class="dash-main">
        <div class="dash-header">
            <h1>Mesai Takibi</h1>
            <p>Aktif mesailer, sıralama ve geçmiş</p>
        </div>
        
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-icon green">⏱️</div>
                <div class="stat-content">
                    <div class="label">Şu An Mesaide</div>
                    <div class="value" id="statActive">—</div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-icon orange">📊</div>
                <div class="stat-content">
                    <div class="label">Toplam Saat</div>
                    <div class="value" id="statTotal">—</div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-icon purple">🏆</div>
                <div class="stat-content">
                    <div class="label">Lider</div>
                    <div class="value" id="statTop" style="font-size: 16px;">—</div>
                </div>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;">
            <!-- AKTİF MESAİLER -->
            <div class="table-card">
                <div class="table-card-head">
                    <div>
                        <div class="table-card-title">⚡ Aktif Mesailer</div>
                        <p style="font-size: 11px; color: var(--text-mute); margin-top: 2px;">Şu an görevde olan personel</p>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="openStartDutyModal()">+ Mesai Başlat</button>
                </div>
                <div id="activeListLoading" class="loading"><div class="spinner"></div></div>
                <div id="activeList" style="display: none;"></div>
            </div>
            
            <!-- LİDERLİK TABLOSU -->
            <div class="table-card">
                <div class="table-card-head">
                    <div>
                        <div class="table-card-title">🏆 Mesai Sıralaması</div>
                        <p style="font-size: 11px; color: var(--text-mute); margin-top: 2px;">En çok çalışan personeller</p>
                    </div>
                    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 CSV</button>
                </div>
                <div id="leaderboardLoading" class="loading"><div class="spinner"></div></div>
                <div id="leaderboardList" style="display: none;"></div>
            </div>
        </div>
    </main>
</div>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>
<script src="/js/permissions.js"></script>
<script src="/js/ui-helpers.js"></script>
<script src="/js/sidebar.js"></script>
<script>
if (!Perms.requireStaff()) { /* yönlendirildi */ }
document.getElementById('topBarContainer').innerHTML = renderTopBar();
document.getElementById('sidebar').innerHTML = renderSidebar('duty');

let allPersonnel = [];
let leaderboardData = [];

async function loadAll() {
    await Promise.all([loadPersonnelList(), loadActive(), loadLeaderboard()]);
}

async function loadPersonnelList() {
    try {
        const res = await api.get('/personnel?limit=200');
        allPersonnel = res.data.items;
    } catch {}
}

async function loadActive() {
    try {
        const res = await api.get('/duty/active');
        const raw = res.data;
        const sessions = Array.isArray(raw) ? raw : (raw?.personnel || raw?.sessions || raw?.data || []);
        document.getElementById('statActive').textContent = sessions.length;

        const c = document.getElementById('activeList');
        if (!sessions.length) {
            c.innerHTML = `<div class="empty"><div class="empty-icon">😴</div>Şu an mesaide kimse yok</div>`;
        } else {
            c.innerHTML = sessions.map(s => {
                const sessionId = s.session_id || s.id;
                const personnelId = s.personnel_id || s.id;
                const displayName = cleanName(s.ic_name) || '?';
                return `
                <div style="display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border);">
                    <div class="av av-sm" style="background: linear-gradient(135deg, #22c55e, #16a34a);">${displayName[0].toUpperCase()}</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600; color: #fff;">
                            ${s.callsign ? `<span style="color: ${s.rank_color || 'var(--text-mute)'};">[${s.callsign}]</span> ` : ''}
                            ${escapeHtml(displayName)}
                        </div>
                        <div style="font-size: 11px; color: var(--text-mute);">${s.rank_name || '—'} · ${formatDateTime(s.started_at).split(',')[1] || ''}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: 700; color: #4ade80;">${formatDuration(s.elapsed_minutes)}</div>
                        <button class="btn btn-danger btn-xs" style="margin-top: 3px;" onclick="endDuty(${sessionId}, ${personnelId}, '${escapeHtml(displayName).replace(/'/g, '')}')">Bitir</button>
                    </div>
                </div>
                `;
            }).join('');
        }
        
        document.getElementById('activeListLoading').style.display = 'none';
        c.style.display = 'block';
    } catch (err) { console.error(err); }
}

async function loadLeaderboard() {
    try {
        const res = await api.get('/duty/leaderboard?limit=30');
        leaderboardData = res.data;
        
        const totalMins = leaderboardData.reduce((s, i) => s + (i.total_minutes || 0), 0);
        document.getElementById('statTotal').textContent = `${Math.round(totalMins / 60)}sa`;
        document.getElementById('statTop').textContent = cleanName(leaderboardData[0]?.ic_name) || '—';
        
        const c = document.getElementById('leaderboardList');
        if (!leaderboardData.length) {
            c.innerHTML = '<div class="empty"><div class="empty-text">Henüz mesai kaydı yok</div></div>';
        } else {
            c.innerHTML = leaderboardData.map((p, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
                const displayName = cleanName(p.ic_name) || '?';
                const sessions = p.total_sessions ?? p.session_count ?? 0;
                return `
                    <div style="display: flex; align-items: center; gap: 12px; padding: 10px 18px; border-bottom: 1px solid var(--border);">
                        <div style="width: 30px; text-align: center; font-size: 15px; font-weight: 700; color: var(--text-mute);">${medal}</div>
                        <div class="av av-sm">${displayName[0].toUpperCase()}</div>
                        <div style="flex: 1;">
                            <div style="font-weight: 600; color: #fff; font-size: 13px;">
                                ${p.callsign ? `<span style="color: ${p.rank_color || 'var(--text-mute)'};">[${p.callsign}]</span> ` : ''}
                                ${escapeHtml(displayName)}
                            </div>
                            <div style="font-size: 11px; color: var(--text-mute);">${p.rank_name || '—'} · ${sessions} oturum</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 700; color: #4ade80;">${formatDuration(p.total_minutes)}</div>
                            <button class="btn btn-ghost btn-xs" style="margin-top: 2px;" onclick="addTime(${p.id}, '${escapeHtml(displayName).replace(/'/g, '')}')">+ Süre</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        document.getElementById('leaderboardLoading').style.display = 'none';
        c.style.display = 'block';
    } catch (err) { console.error(err); }
}

function openStartDutyModal() {
    if (!allPersonnel.length) { showError('Önce personel yüklenmeli'); return; }
    
    const options = allPersonnel.map(p => {
        const icName = escapeHtml(cleanName(p.ic_name).split('|')[0].trim());
        return `<option value="${p.id}">${p.callsign ? `${p.callsign} | ` : ''}${icName}</option>`;
    }).join('');
    
    showModal({
        title: 'Mesai Başlat',
        body: `
            <form id="startDutyForm">
                <div class="form-group">
                    <label>Personel</label>
                    <select name="personnel_id" required>
                        <option value="">— Seç —</option>
                        ${options}
                    </select>
                </div>
            </form>
        `,
        buttons: [
            { id: 'cancel', label: 'İptal', class: 'btn-ghost', onClick: closeModal },
            { id: 'start', label: '⏱️ Başlat', class: 'btn-primary', onClick: async () => {
                const fd = new FormData(document.getElementById('startDutyForm'));
                const pid = parseInt(fd.get('personnel_id'));
                if (!pid) { showError('Personel seç'); return; }
                try {
                    await api.post('/duty/start', { personnel_id: pid });
                    showSuccess('Mesai başlatıldı');
                    closeModal();
                    loadActive();
                } catch (err) { showError(err.message); }
            }},
        ],
    });
}

async function endDuty(sessionId, personnelId, name) {
    showConfirm(`${name} adlı memurun mesaisini bitirmek istediğine emin misin?`, async () => {
        try {
            await api.post('/duty/end', { personnel_id: personnelId, session_id: sessionId });
            showSuccess('Mesai bitirildi');
            loadActive();
            loadLeaderboard();
        } catch (err) { showError(err.message); }
    });
}

function addTime(personnelId, name) {
    showModal({
        title: `${name} - Süre Ekle`,
        body: `
            <form id="addTimeForm">
                <div class="form-group">
                    <label>Eklenecek Dakika</label>
                    <input name="minutes" type="number" required value="60" />
                    <p style="font-size: 11px; color: var(--text-mute); margin-top: 4px;">Negatif değer = düşer</p>
                </div>
            </form>
        `,
        buttons: [
            { id: 'cancel', label: 'İptal', class: 'btn-ghost', onClick: closeModal },
            { id: 'save', label: 'Ekle', class: 'btn-primary', onClick: async () => {
                const fd = new FormData(document.getElementById('addTimeForm'));
                const m = parseInt(fd.get('minutes'));
                if (isNaN(m) || m === 0) { showError('Geçerli dakika gir'); return; }
                try {
                    await api.post('/duty/add-time', { personnel_id: personnelId, minutes: m });
                    showSuccess(`${m} dk eklendi`);
                    closeModal();
                    loadLeaderboard();
                } catch (err) { showError(err.message); }
            }},
        ],
    });
}

function exportCSV() {
    if (!leaderboardData.length) { showError('Veri yok'); return; }
    
    let csv = 'Sıra,Telsiz,IC İsim,OOC,Rütbe,Toplam Saat,Oturum Sayısı\n';
    leaderboardData.forEach((p, i) => {
        csv += `${i+1},"${p.callsign || ''}","${(p.ic_name || '').replace(/"/g, '""')}","${(p.ooc_name || '').replace(/"/g, '""')}","${p.rank_name || ''}",${(p.total_minutes / 60).toFixed(2)},${p.total_sessions}\n`;
    });
    
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mesai-siralama-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showSuccess('CSV indirildi');
}

loadAll();
setInterval(() => {
    if (document.getElementById('modal-bd')) return;
    loadActive();
    loadLeaderboard();
}, 15000);

async function ekleSure(personnelId) {
    // personnelId yoksa seç
    if (!personnelId) {
        const id = prompt('Personel ID girin:');
        if (!id) return;
        personnelId = parseInt(id);
    }
    
    const dakika = prompt('Kaç dakika eklensin? (negatif sayı = silinir)');
    if (!dakika) return;
    
    const minutes = parseInt(dakika);
    if (isNaN(minutes) || minutes === 0) {
        alert('Geçerli bir sayı girin.');
        return;
    }
    
    try {
        const res = await api.post('/duty/add-time', {
            personnel_id: personnelId,
            minutes: minutes
        });
        
        alert(`✅ ${minutes} dakika eklendi!`);
        
        // Listeyi yenile
        if (typeof loadAll === 'function') loadAll();
        else if (typeof loadLeaderboard === 'function') loadLeaderboard();
        else location.reload();
    } catch (err) {
        alert('❌ Hata: ' + err.message);
    }
}

</script>
</body>
</html>
