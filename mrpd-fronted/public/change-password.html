<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Şifre Değiştir · MRPD</title>
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/public.css">
</head>
<body>

<div class="login-wrap">
    <div class="login-side">
        <div class="login-form-card">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 32px;">
                <div class="pub-brand-icon">🔑</div>
                <div>
                    <div style="font-size: 18px; font-weight: 700;" data-brand-name>Mission Row PD</div>
                    <div style="font-size: 11px; color: var(--text-mute);">Şifre Değiştirme</div>
                </div>
            </div>

            <h1>Şifrenizi Değiştirin</h1>
            <p id="subtitle">Güvenliğiniz için şifrenizi değiştirmeniz gerekmektedir.</p>

            <div id="error" style="display:none; padding: 10px 14px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; border-radius: 8px; font-size: 13px; margin-bottom: 16px;"></div>
            <div id="success" style="display:none; padding: 10px 14px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #4ade80; border-radius: 8px; font-size: 13px; margin-bottom: 16px;"></div>

            <form id="changePwdForm">
                <div class="form-group">
                    <label>Mevcut Şifre</label>
                    <input type="password" id="currentPassword" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label>Yeni Şifre</label>
                    <input type="password" id="newPassword" required placeholder="En az 6 karakter" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Yeni Şifre (Tekrar)</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-login" id="submitBtn">Şifremi Değiştir</button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-mute);">
                <a href="/index.html" id="skipLink" style="display:none; color: var(--text-mute); text-decoration: none;">Şimdi değil, sonra yapayım →</a>
            </div>
        </div>
    </div>

    <div class="login-image"></div>
</div>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>
<script>
if (!Auth.isLoggedIn()) window.location.href = '/login.html';

const user = Auth.user();
const forceChange = user && user.force_password_change;

if (!forceChange) {
    document.getElementById('subtitle').textContent = 'Hesabınızın şifresini değiştirin.';
    document.getElementById('skipLink').style.display = 'inline';
}

const form = document.getElementById('changePwdForm');
const errorDiv = document.getElementById('error');
const successDiv = document.getElementById('success');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword.length < 6) {
        errorDiv.textContent = 'Yeni şifre en az 6 karakter olmalı';
        errorDiv.style.display = 'block';
        return;
    }

    if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'Yeni şifreler eşleşmiyor';
        errorDiv.style.display = 'block';
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Değiştiriliyor...';

    try {
        await Auth.changePassword(currentPassword, newPassword);
        successDiv.textContent = 'Şifreniz değiştirildi. Yeniden giriş yapmanız gerekiyor...';
        successDiv.style.display = 'block';
        Auth.logout();
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    } catch (err) {
        errorDiv.textContent = err.message || 'Şifre değiştirilemedi';
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Şifremi Değiştir';
    }
});
</script>
</body>
</html>
