<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MRPD - Discord Giriş</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f1729 0%, #1e293b 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
    }
    
    .loading-card {
        text-align: center;
        padding: 40px;
    }
    
    .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    h1 { font-size: 22px; color: #fff; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; }
</style>
</head>
<body>
    <div class="loading-card">
        <div class="spinner"></div>
        <h1>Discord ile Giriş Yapılıyor...</h1>
        <p id="status">Lütfen bekle</p>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const access = params.get('access');
        const refresh = params.get('refresh');
        const error = params.get('error');
        
        if (error) {
            document.getElementById('status').textContent = 'Hata: ' + error;
            setTimeout(() => window.location.href = '/login.html?error=' + error, 2000);
        } else if (access && refresh) {
            // Tokenları kaydet
            TokenManager.setTokens(access, refresh);
            
            // User bilgisini al
            (async () => {
                try {
                    const user = await Auth.me();
                    document.getElementById('status').textContent = `Hoş geldin ${user.discord_username || user.username}!`;
                    setTimeout(() => window.location.href = '/index.html', 800);
                } catch (err) {
                    document.getElementById('status').textContent = 'Profil yüklenemedi';
                    setTimeout(() => window.location.href = '/login.html', 2000);
                }
            })();
        } else {
            document.getElementById('status').textContent = 'Geçersiz callback';
            setTimeout(() => window.location.href = '/login.html', 2000);
        }
    </script>
</body>
</html>
